#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = systemctl --user enable --now hyprpolkitagent.service
exec-once = uwsm app -- noctalia-shell

exec-once = uwsm app -- steam

exec-once = [workspace 5 silent, monitor HDMI-A-1] sleep 3; uwsm app -- pear-desktop
exec-once = [monitor DP-1, workspace 3] sleep 3; uwsm app -- zen-beta
exec-once = [workspace 1 silent] uwsm app -- vesktop
exec-once = [workspace 9 silent] sleep 3; uwsm app -- qpwgraph
exec-once = [workspace 9 silent] sleep 3; uwsm app -- easyeffects
exec-once = ~/Documents/audioscript.sh
exec-once = ydotool
exec-once = [workspace 4 silent, monitor DP-1] sleep 3; uwsm app -- obs 
