##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = match:class ^(steam)$, workspace 2, monitor DP-1
windowrule = match:class ^(Celeste)$, monitor DP-1, fullscreen on, sync_fullscreen off

windowrule = match:class ^(vesktop)$, workspace 1, monitor HDMI-A-1
windowrule = match:class ^(obs-studio)$, monitor HDMI-A-1
#windowrule = match:class ^(*youtube_music*)$, monitor HDMI-A-1 
windowrule = match:class ^(qpwgraph)$, workspace 9, monitor HDMI-A-1
windowrule = match:class ^(easyeffects)$, workspace 9, monitor HDMI-A-1

windowrule = match:title ^(settings)$, float on
windowrule = match:fullscreen true, opacity 1 1

windowrule = match:class alacritty, opacity 1 1
windowrule = match:class zen-beta, opacity 1 1

windowrule = match:title .*DEBUG.*, float true, center true
windowrule = match:class Godot, match:initial_title Godot, float false, center true

windowrule = match:class ueberzugpp.*, float true, no_initial_focus true 

xwayland {
  force_zero_scaling = true
}
